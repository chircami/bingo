<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital Bingo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a237e;
            --accent: #e53935;
            --highlight: #2e7d32;
            --gold: #f9a825;
            --bg: #e8eaf6;
            --card-bg: #ffffff;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 20% 20%, #c5cae9 0%, transparent 50%),
                              radial-gradient(circle at 80% 80%, #f8bbd0 0%, transparent 50%);
            margin: 0;
            padding: 10px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .page-wrapper {
            width: 100%;
            max-width: 640px;
            flex: 1;
        }

        /* Screens */
        .screen { display: none; width: 100%; }
        .active { display: block; }

        .card {
            background: var(--card-bg);
            padding: 28px 24px;
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.12);
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 2.6rem;
            color: var(--primary);
            margin: 0 0 4px 0;
            letter-spacing: 1px;
        }

        h2 {
            font-family: 'Fredoka One', cursive;
            font-size: 1.6rem;
            margin: 0 0 12px 0;
        }

        /* Main Board Grid */
        .main-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 5px;
            margin-top: 18px;
        }

        .cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #e8eaf6;
            font-size: 0.72rem;
            font-weight: 700;
            border-radius: 6px;
            color: #9fa8da;
            background: #f5f5f5;
            transition: all 0.3s;
        }

        .cell.extracted {
            background: var(--accent) !important;
            color: white !important;
            border-color: var(--accent);
            transform: scale(1.05);
            box-shadow: 0 2px 8px rgba(229,57,53,0.4);
        }

        #big-number {
            font-family: 'Fredoka One', cursive;
            font-size: 110px;
            color: var(--primary);
            font-weight: normal;
            line-height: 1;
            margin: 10px 0;
            text-shadow: 4px 4px 0 #c5cae9;
            transition: transform 0.15s, color 0.15s;
        }

        #big-number.pop {
            transform: scale(1.2);
            color: var(--accent);
        }

        /* Player rows */
        .player-row {
            background: white;
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 6px solid var(--primary);
            box-shadow: 0 3px 10px rgba(0,0,0,0.07);
        }

        .qr-box {
            background: white;
            padding: 5px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        /* Player Cards */
        .mobile-card {
            background: #fff;
            border: 3px solid var(--primary);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 28px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }

        .mobile-card h3 {
            font-family: 'Fredoka One', cursive;
            color: var(--primary);
            margin: 0 0 14px 0;
            font-size: 1.3rem;
            font-weight: normal;
        }

        .grid-5 {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .num-btn {
            aspect-ratio: 1;
            border: 2px solid #c5cae9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.25rem;
            border-radius: 50%;
            cursor: pointer;
            background: #f5f5f5;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .num-btn.marked {
            background: var(--highlight);
            color: white;
            border-color: var(--highlight);
            transform: scale(0.92);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }

        /* Inputs & Buttons */
        label {
            display: block;
            text-align: left;
            font-weight: 700;
            color: var(--primary);
            margin-top: 14px;
            margin-bottom: 4px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 14px;
            margin: 4px 0 8px;
            border: 2px solid #c5cae9;
            border-radius: 10px;
            font-size: 1rem;
            font-family: 'Nunito', sans-serif;
            transition: border-color 0.2s;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 800;
            width: 100%;
            font-size: 1.1rem;
            font-family: 'Nunito', sans-serif;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 8px;
        }

        button:active { opacity: 0.85; transform: scale(0.98); }

        .btn-draw {
            background: linear-gradient(135deg, var(--highlight), #43a047);
            font-family: 'Fredoka One', cursive;
            font-size: 1.6rem;
            font-weight: normal;
            letter-spacing: 1px;
            box-shadow: 0 5px 0 #1b5e20;
            margin-top: 12px;
        }

        .btn-draw:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .btn-reset {
            background: #90a4ae;
            margin-top: 28px;
            font-size: 0.9rem;
        }

        /* Footer */
        footer {
            width: 100%;
            max-width: 640px;
            text-align: center;
            padding: 18px 10px;
            color: #5c6bc0;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        footer span { color: var(--accent); font-size: 1.1rem; }

        /* Win / Line Modal */
        #win-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        #win-overlay.show { display: flex; }

        .win-box {
            background: white;
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            max-width: 320px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            z-index: 1001;
        }

        @keyframes bounceIn {
            from { transform: scale(0.3); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .win-emoji { font-size: 4rem; display: block; margin-bottom: 10px; }
        .win-title { font-family: 'Fredoka One', cursive; font-size: 2.5rem; color: var(--primary); margin: 0 0 8px 0; }
        .win-subtitle { font-size: 1rem; color: #666; margin-bottom: 20px; }
        .win-close {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 1rem;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            cursor: pointer;
            width: auto;
        }

        /* Confetti canvas */
        #confetti-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        .balls-left {
            font-size: 0.85rem;
            color: #9fa8da;
            margin-top: 6px;
        }
    </style>
</head>
<body>

<div class="page-wrapper">

    <div id="scr-setup" class="screen active card">
        <h1 id="t-title">🎱 Bingo Digital</h1>
        <p style="color:#7986cb; margin: 0 0 16px; font-size:0.95rem;">¡El bingo de tu familia!</p>

        <label id="l-lang">Idioma / Language</label>
        <select id="in-lang" onchange="translateUI()">
            <option value="es-ES">🇪🇸 Español</option>
            <option value="en-US">🇺🇸 English</option>
            <option value="it-IT">🇮🇹 Italiano</option>
            <option value="fr-FR">🇫🇷 Français</option>
        </select>

        <label id="l-names">Nombres (separados por coma)</label>
        <textarea id="in-names" placeholder="Alessio, Juliette..." rows="3"></textarea>

        <label id="l-cards">Cartillas por jugador</label>
        <input type="number" id="in-cards" value="1" min="1" max="3">

        <button id="b-start" onclick="initGame()">Generar Juego</button>
    </div>

    <div id="scr-game" class="screen">
        <div class="card">
            <h2 id="t-ball">🎱 Número</h2>
            <div id="big-number">--</div>
            <div class="balls-left" id="balls-left"></div>
            <button class="btn-draw" id="b-draw" onclick="drawBall()">¡Cantar!</button>
            <div class="main-grid" id="main-board"></div>
            <button class="btn-reset" onclick="location.reload()">🔄 Reiniciar todo</button>
        </div>
        <div id="list-qrs"></div>
    </div>

    <div id="scr-player" class="screen">
        <div class="card" style="background: linear-gradient(135deg, var(--primary), #3949ab); color: white; border-radius: 20px; margin-bottom: 20px;">
            <h2 id="player-name-display" style="color: white;">Mis Cartillas</h2>
        </div>
        <div id="player-cards-box"></div>
        <p style="text-align:center; color:#7f8c8d; font-size:0.85rem;" id="t-tap-hint">Toca los números para marcarlos</p>
        <button onclick="window.location.hash=''; location.reload();" style="background:var(--accent); margin-top:20px;" id="b-exit">Salir del juego</button>
    </div>

</div>

<!-- Footer -->
<footer>
    Creado en BCN con <span>❤️</span> por Mirko
</footer>

<!-- Error Modal -->
<div id="error-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:2000; align-items:center; justify-content:center;">
    <div style="background:white; border-radius:20px; padding:36px 28px; max-width:300px; width:88%; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.3); animation:bounceIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275);">
        <div style="font-size:3rem; margin-bottom:10px;">⚠️</div>
        <div id="error-title" style="font-family:'Fredoka One',cursive; font-size:1.6rem; color:#e53935; margin-bottom:8px;">¡Atención!</div>
        <div id="error-msg" style="font-size:1rem; color:#555; margin-bottom:24px; line-height:1.4;"></div>
        <button onclick="document.getElementById('error-overlay').style.display='none'" style="background:#e53935; width:auto; padding:12px 36px; border-radius:10px; font-size:1rem; font-family:'Nunito',sans-serif; font-weight:800; cursor:pointer; border:none; color:white;">OK</button>
    </div>
</div>

<!-- Win Overlay -->
<div id="win-overlay">
    <div class="win-box">
        <span class="win-emoji" id="win-emoji">🎉</span>
        <div class="win-title" id="win-title">¡BINGO!</div>
        <div class="win-subtitle" id="win-subtitle">¡Has ganado!</div>
        <button class="win-close" onclick="closeWin()">OK</button>
    </div>
</div>

<!-- Confetti Canvas -->
<canvas id="confetti-canvas"></canvas>

    function showError(title, msg) {
        document.getElementById('error-title').innerText = title;
        document.getElementById('error-msg').innerText = msg;
        const overlay = document.getElementById('error-overlay');
        overlay.style.display = 'flex';
    }

    function translateUI() {
        currentLang = document.getElementById('in-lang').value;
        const t = i18n[currentLang];
        document.getElementById('t-title').innerText = t.title;
        document.getElementById('t-ball').innerText = t.ball;
        document.getElementById('b-draw').innerText = t.draw;
        document.getElementById('b-start').innerText = t.start;
        document.getElementById('l-lang').innerText = t.lang;
        document.getElementById('l-names').innerText = t.names;
        document.getElementById('l-cards').innerText = t.cards;
    }

    function initGame() {
        const rawNames = document.getElementById('in-names').value;
        const names = rawNames.split(',').map(n => n.trim()).filter(n => n !== "");
        const c = parseInt(document.getElementById('in-cards').value);
        const t = i18n[currentLang];

        if (names.length === 0) { showError(t.errorTitle, t.noNames); return; }

        showScreen('scr-game');
        bombo = Array.from({length: 90}, (_, i) => i + 1);
        updateBallsLeft();

        const board = document.getElementById('main-board');
        board.innerHTML = '';
        for (let i = 1; i <= 90; i++) board.innerHTML += `<div class="cell" id="c${i}">${i}</div>`;

        const list = document.getElementById('list-qrs');
        list.innerHTML = '';

        names.forEach((name, index) => {
            let playerDeck = [];
            for (let k = 0; k < c; k++) playerDeck.push(genNumbers());

            const row = document.createElement('div');
            row.className = 'player-row';
            const qid = `qrp${index}`;
            row.innerHTML = `<div><b>${name}</b><br><small>${c} ${t.cardLabel}${c > 1 ? 's' : ''}</small></div>
                             <div class="qr-box"><div id="${qid}"></div></div>`;
            list.appendChild(row);

            const data = btoa(unescape(encodeURIComponent(`${name}|${currentLang}|${playerDeck.map(n => n.join(',')).join('|')}`)));
            const url = window.location.origin + window.location.pathname + "#" + data;

            new QRCode(document.getElementById(qid), { text: url, width: 100, height: 100 });
        });
    }

    function genNumbers() {
        let n = [];
        while (n.length < 15) {
            let r = Math.floor(Math.random() * 90) + 1;
            if (!n.includes(r)) n.push(r);
        }
        return n.sort((a, b) => a - b);
    }

            el.innerText = `${bombo.length} ${t.ballsLeft}`;

        }
    };

    // Palabras clave de voces de alta calidad (enhanced, premium, neural, natural)
    // El orden importa: cuanto más arriba en la lista, mayor prioridad
    const QUALITY_KEYWORDS = [
        'monica',        // macOS/iOS - la mejor voz española disponible
        'paulina',       // macOS - español México muy natural
        'jorge',         // macOS - español España buena calidad
        'alice',         // macOS/iOS - italiana de alta calidad
        'enhanced',      // iOS voces enhanced
        'premium',       // Windows voces premium
        'neural',        // Windows Neural voices
        'natural',
        'siri',
        'google',        // Android Google TTS suele ser mejor
    ];

    // Códigos de idioma aceptados por orden de preferencia para cada idioma del juego
    const LANG_CODES = {
        'es-ES': ['es-ES', 'es-MX', 'es-AR', 'es-US', 'es'],
        'it-IT': ['it-IT', 'it'],
        'en-US': ['en-US', 'en-GB', 'en-AU', 'en'],
        'fr-FR': ['fr-FR', 'fr-CA', 'fr-BE', 'fr'],
    };

    let voiceCache = {};
    let voicesReady = false;

    // Carga voces en cuanto estén disponibles y limpia la caché
    function initVoices() {
        const load = () => { voiceCache = {}; voicesReady = true; };
        if (window.speechSynthesis.getVoices().length > 0) { voicesReady = true; }
        window.speechSynthesis.onvoiceschanged = load;
        // Chrome a veces no dispara el evento si las voces ya estaban — forzamos
        setTimeout(() => { if (!voicesReady) load(); }, 500);
    }

    function pickBestVoice(lang) {
        if (voiceCache[lang]) return voiceCache[lang];

        const all = window.speechSynthesis.getVoices();
        const codes = LANG_CODES[lang] || [lang];

        // Candidatos: voces cuyo lang empieza por alguno de los códigos aceptados
        const candidates = all.filter(v =>
            codes.some(c => v.lang === c || v.lang.startsWith(c.split('-')[0]))
        );

        if (candidates.length === 0) { voiceCache[lang] = null; return null; }

        // Puntuación: cuanto más alta, mejor calidad percibida
        function score(v) {
            let s = 0;
            const name = v.name.toLowerCase();
            // Bonus por nombre de voz de alta calidad conocida
            QUALITY_KEYWORDS.forEach((kw, i) => {
                if (name.includes(kw)) s += (QUALITY_KEYWORDS.length - i) * 10;
            });
            // Bonus por coincidencia exacta de locale (es-ES > es-MX > es)
            const exactIdx = codes.indexOf(v.lang);
            if (exactIdx >= 0) s += (codes.length - exactIdx) * 5;
            // Bonus si es la voz local del sistema (suele ser más natural)
            if (v.localService) s += 3;
            return s;
        }

        candidates.sort((a, b) => score(b) - score(a));
        voiceCache[lang] = candidates[0];
        return candidates[0];
    }

    function speakNumber(num, lang) {
        window.speechSynthesis.cancel();
        const text = (numberWords[lang] && numberWords[lang][num])
            ? numberWords[lang][num]
            : num.toString();

        const doSpeak = () => {
            const msg = new SpeechSynthesisUtterance();
            msg.text  = text;
            msg.lang  = lang;
            msg.rate  = 0.78;   // un poco más lento = más claro y natural
            msg.pitch = 1.0;
            msg.volume = 1.0;
            const voice = pickBestVoice(lang);
            if (voice) msg.voice = voice;
            window.speechSynthesis.speak(msg);
        };

        // Si las voces aún no han cargado, esperamos un ciclo más
        if (!voicesReady || window.speechSynthesis.getVoices().length === 0) {
            window.speechSynthesis.onvoiceschanged = () => { voiceCache = {}; voicesReady = true; doSpeak(); };
            setTimeout(doSpeak, 400); // fallback si el evento nunca llega
        } else {
            setTimeout(doSpeak, 80);
        }
    }

    function drawBall() {
        if (bombo.length === 0) return;
        const idx = Math.floor(Math.random() * bombo.length);
        const num = bombo.splice(idx, 1)[0];

        const el = document.getElementById('big-number');
        el.innerText = num;
        el.classList.remove('pop');
        void el.offsetWidth; // reflow
        el.classList.add('pop');
        setTimeout(() => el.classList.remove('pop'), 300);

        document.getElementById(`c${num}`).classList.add('extracted');
        updateBallsLeft();

        speakNumber(num, currentLang);
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    /* ===================== PLAYER SCREEN ===================== */
    function checkHash() {
        const hash = window.location.hash.substring(1);
        if (!hash || hash.length < 10) return;

        try {
            const decoded = decodeURIComponent(escape(atob(hash))).split('|');
            const name = decoded[0];
            const lang = decoded[1];
            playerLang = lang;
            const cards = decoded.slice(2);
            const t = i18n[lang];

            showScreen('scr-player');
            document.getElementById('player-name-display').innerText = `${name} — ${t.mycards}`;
            document.getElementById('t-tap-hint').innerText = t.tapHint;
            document.getElementById('b-exit').innerText = t.exit;

            const container = document.getElementById('player-cards-box');
            container.innerHTML = '';

            cards.forEach((c, i) => {
                const nums = c.split(',');
                const cardDiv = document.createElement('div');
                cardDiv.className = 'mobile-card';
                cardDiv.dataset.total = nums.length;
                cardDiv.dataset.marked = 0;

                let html = `<h3>${t.cardLabel} ${i + 1}</h3><div class="grid-5">`;
                nums.forEach(num => {
                    html += `<div class="num-btn" data-num="${num}" onclick="toggleNum(this, ${i})">${num}</div>`;
                });
                cardDiv.innerHTML = html + `</div>`;
                container.appendChild(cardDiv);
            });

        } catch (e) {
            console.error("Error al procesar QR", e);
        }
    }

    function toggleNum(btn, cardIndex) {
        btn.classList.toggle('marked');
        checkWinConditions(cardIndex);
    }

    function checkWinConditions(cardIndex) {
        const cards = document.querySelectorAll('.mobile-card');
        const card = cards[cardIndex];
        const allBtns = Array.from(card.querySelectorAll('.num-btn'));
        const rows = [];

        // Split 15 numbers into 3 rows of 5
        for (let r = 0; r < 3; r++) {
            rows.push(allBtns.slice(r * 5, r * 5 + 5));
        }

        // Check full card (BINGO)
        const totalMarked = allBtns.filter(b => b.classList.contains('marked')).length;
        if (totalMarked === allBtns.length) {
            showWin('bingo', playerLang);
            return;
        }

        // Check each row (LÍNEA) — only trigger once per row completion
        rows.forEach(row => {
            const allMarked = row.every(b => b.classList.contains('marked'));
            const rowKey = 'row_' + cardIndex + '_' + row[0].dataset.num;
            if (allMarked && !card.dataset[rowKey]) {
                card.dataset[rowKey] = '1';
                showWin('linea', playerLang);
            }
        });
    }

    function showWin(type, lang) {
        const t = i18n[lang];
        const overlay = document.getElementById('win-overlay');
        document.getElementById('win-emoji').innerText = type === 'bingo' ? t.bingoEmoji : t.lineaEmoji;
        document.getElementById('win-title').innerText = type === 'bingo' ? t.bingo : t.linea;
        document.getElementById('win-subtitle').innerText = type === 'bingo' ? t.bingoMsg : t.lineaMsg;
        overlay.classList.add('show');
        startConfetti();
    }

    function closeWin() {
        document.getElementById('win-overlay').classList.remove('show');
        stopConfetti();
    }

    /* ===================== CONFETTI ===================== */
    function startConfetti() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const colors = ['#e53935', '#1a237e', '#f9a825', '#2e7d32', '#7b1fa2', '#0288d1', '#ff6f00'];
        const particles = [];

        for (let i = 0; i < 180; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * -canvas.height,
                w: Math.random() * 14 + 6,
                h: Math.random() * 7 + 4,
                color: colors[Math.floor(Math.random() * colors.length)],
                rotation: Math.random() * 360,
                speed: Math.random() * 3 + 2,
                rotSpeed: (Math.random() - 0.5) * 6,
                swing: Math.random() * 2 - 1
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let allGone = true;
            particles.forEach(p => {
                p.y += p.speed;
                p.x += p.swing;
                p.rotation += p.rotSpeed;
                if (p.y < canvas.height + 20) allGone = false;

                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate((p.rotation * Math.PI) / 180);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                ctx.restore();
            });

            if (!allGone) {
                confettiAnimId = requestAnimationFrame(draw);
            } else {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }

        if (confettiAnimId) cancelAnimationFrame(confettiAnimId);
        draw();

        // Auto stop after 5s
        setTimeout(() => stopConfetti(), 5000);
    }

    function stopConfetti() {
        if (confettiAnimId) {
            cancelAnimationFrame(confettiAnimId);
            confettiAnimId = null;
        }
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    window.onload = () => { translateUI(); checkHash(); initVoices(); };
    window.onhashchange = checkHash;
    window.onresize = () => {
        const canvas = document.getElementById('confetti-canvas');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    };
</script>
